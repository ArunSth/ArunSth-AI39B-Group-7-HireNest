{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Log In</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="user-email">Email Address</label>
        <input type="email" id="user-email" placeholder="name@example.com" required>
      </div>
      <div class="form-group">
        <label for="user-password">Password</label>
        <input type="password" id="user-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Welcome Back</button>
    </form>
    <div class="form-utilities" style="display: flex; justify-content: space-between; margin-top: 15px; font-size: 14px;">
      <a href="/forget-password" style="color: #6d5dfc; text-decoration: none;">Forgot Password?</a>
    </div>
    <p class="switch-form-text">
      <span>Don't have an account?</span>
      <a href="/register">Sign Up</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
