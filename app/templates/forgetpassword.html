{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Reset Password</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; line-height: 1.5;">
      Enter your email address and we will send you a secure link to reset your account credentials.
    </p>
    <form id="forget-password-form">
      <div class="form-group">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" placeholder="name@example.com" required>
      </div>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>
    <p class="switch-form-text">
      <a href="/login">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/forgetpassword.js"></script>
{% endblock %}
