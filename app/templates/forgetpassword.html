{% extends "base.html" %}

{% block title %}Reset Password — HireNest{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forgetpassword.css') }}" />
{% endblock %}

{% block content %}
  <article class="auth-card auth-card--centered">
    <div class="auth-badge"><i class="fa-solid fa-key"></i></div>
    <div class="form-head form-head--center">
      <h3>Reset access</h3>
      <p>We’ll email you a secure reset link.</p>
    </div>

    <form id="forget-form" class="auth-form">
      <div class="form-group">
        <label for="fp-email">Email</label>
        <input id="fp-email" type="email" placeholder="name@example.com" required>
      </div>
      <button class="btn-submit" type="submit">Send Reset Link</button>
    </form>

    <p class="switch-form-text"><a href="{{ url_for('login_page.login') }}">Back to login</a></p>
  </article>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/forgetpassword.js') }}"></script>
{% endblock %}
