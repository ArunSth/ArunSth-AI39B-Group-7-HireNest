{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">

    <!-- STEP 1: Email check -->
    <div id="step-email">
      <h2>Forgot Password</h2>
      <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; line-height: 1.5;">
        Enter the email address linked to your account.
      </p>
      <div id="email-alert" style="display:none; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 14px;"></div>
      <div class="form-group">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" placeholder="name@example.com">
      </div>
      <button id="check-email-btn" class="btn-submit">Continue</button>
      <p class="switch-form-text" style="margin-top: 16px;">
        <a href="/login">Back to Login</a>
      </p>
    </div>

    <!-- STEP 2: New password (hidden until email verified) -->
    <div id="step-reset" style="display:none;">
      <h2>Set New Password</h2>
      <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; line-height: 1.5;">
        Enter your new password below.
      </p>
      <div id="reset-alert" style="display:none; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 14px;"></div>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter new password">
      </div>
      <button id="reset-btn" class="btn-submit">Reset Password</button>
      <p class="switch-form-text" style="margin-top: 16px;">
        <a href="/login">Back to Login</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {

    const stepEmail  = document.getElementById('step-email');
    const stepReset  = document.getElementById('step-reset');
    const emailInput = document.getElementById('reset-email');
    const emailAlert = document.getElementById('email-alert');
    const resetAlert = document.getElementById('reset-alert');
    const checkBtn   = document.getElementById('check-email-btn');
    const resetBtn   = document.getElementById('reset-btn');

    let verifiedEmail = '';

    function showAlert(el, message, type) {
        el.textContent = message;
        el.style.display = 'block';
        if (type === 'error') {
            el.style.background = '#fef2f2';
            el.style.color      = '#dc2626';
            el.style.border     = '1px solid #fca5a5';
        } else {
            el.style.background = '#f0fdf4';
            el.style.color      = '#16a34a';
            el.style.border     = '1px solid #86efac';
        }
    }

    function hideAlert(el) {
        el.style.display = 'none';
        el.textContent = '';
    }

    // STEP 1 — Check email
    checkBtn.addEventListener('click', async () => {
        hideAlert(emailAlert);
        const email = (emailInput.value || '').trim();

        if (!email) {
            showAlert(emailAlert, 'Please enter your email address.', 'error');
            return;
        }

        checkBtn.disabled    = true;
        checkBtn.textContent = 'Checking...';

        try {
            const res  = await fetch('/forget-password/check-email', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email: email }),
            });
            const data = await res.json();

            if (data.status === 'success') {
                verifiedEmail = email;
                stepEmail.style.display = 'none';
                stepReset.style.display = 'block';
            } else {
                showAlert(emailAlert, data.message || 'No account found with this email.', 'error');
            }
        } catch (err) {
            showAlert(emailAlert, 'Network error. Please try again.', 'error');
        } finally {
            checkBtn.disabled    = false;
            checkBtn.textContent = 'Continue';
        }
    });

    emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkBtn.click();
    });

    // STEP 2 — Reset password
    resetBtn.addEventListener('click', async () => {
        hideAlert(resetAlert);
        const newPw  = document.getElementById('new-password').value;
        const confPw = document.getElementById('confirm-password').value;

        if (!newPw || !confPw) {
            showAlert(resetAlert, 'Please fill in both password fields.', 'error');
            return;
        }
        if (newPw.length < 8) {
            showAlert(resetAlert, 'Password must be at least 8 characters.', 'error');
            return;
        }
        if (newPw !== confPw) {
            showAlert(resetAlert, 'Passwords do not match.', 'error');
            return;
        }

        resetBtn.disabled    = true;
        resetBtn.textContent = 'Resetting...';

        try {
            const res  = await fetch('/forget-password/reset', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    email:            verifiedEmail,
                    new_password:     newPw,
                    confirm_password: confPw,
                }),
            });
            const data = await res.json();

            if (data.status === 'success') {
                showAlert(resetAlert, 'Password reset successfully! Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                showAlert(resetAlert, data.message || 'Something went wrong.', 'error');
                resetBtn.disabled    = false;
                resetBtn.textContent = 'Reset Password';
            }
        } catch (err) {
            showAlert(resetAlert, 'Network error. Please try again.', 'error');
            resetBtn.disabled    = false;
            resetBtn.textContent = 'Reset Password';
        }
    });

});
</script>
{% endblock %}
