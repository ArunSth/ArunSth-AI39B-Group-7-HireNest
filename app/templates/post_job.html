{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container">
  {% include 'sidebar_employer.html' %}

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h2>Post a New Job</h2>
      </div>
    </div>

    <div class="content">
      <div class="section" style="max-width: 900px;">
        <div class="table-container">
          <form method="POST" data-validate>
            <div class="form-row">
              <div class="form-group">
                <label for="title">Job Title *</label>
                <input type="text" id="title" name="title" placeholder="e.g., Senior Python Developer" required>
              </div>
              <div class="form-group">
                <label for="job_type">Job Type *</label>
                <select id="job_type" name="job_type" required>
                  <option value="Full-time">Full-time</option>
                  <option value="Part-time">Part-time</option>
                  <option value="Contract">Contract</option>
                  <option value="Internship">Internship</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="description">Job Description *</label>
              <textarea id="description" name="description" placeholder="Describe the job responsibilities, duties, and requirements..." required></textarea>
            </div>

            <div class="form-group">
              <label for="requirement">Required Skills & Qualifications *</label>
              <textarea id="requirement" name="requirement" placeholder="List the required skills, education, and qualifications..." required></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="salary">Salary (Optional)</label>
                <input type="number" id="salary" name="salary" placeholder="e.g., 500000" step="0.01">
              </div>
              <div class="form-group">
                <label for="location">Location *</label>
                <input type="text" id="location" name="location" placeholder="e.g., Kathmandu, Nepal" required>
              </div>
            </div>

            <div class="form-group">
              <label for="experience_level">Experience Level *</label>
              <select id="experience_level" name="experience_level" required>
                <option value="Entry-level">Entry-level</option>
                <option value="Mid-level">Mid-level</option>
                <option value="Senior">Senior</option>
                <option value="Executive">Executive</option>
              </select>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
              <button type="submit" class="btn-primary">
                <i class="fas fa-plus"></i> Post Job
              </button>
              <a href="/employer/jobs" class="btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/static/css/employer_dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}
