{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Sign Up</h2>
    <form id="signup-form">
      <div class="form-group">
        <label for="user-name">Full Name</label>
        <input type="text" id="user-name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="user-phone">Phone Number</label>
        <input type="tel" id="user-phone" placeholder="+977 98XXXXXXXX" required>
      </div>
      <div class="form-group">
        <label for="user-email">Email Address</label>
        <input type="email" id="user-email" placeholder="name@example.com" required>
      </div>
      <div class="form-group">
        <label for="user-password">Password</label>
        <input type="password" id="user-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>
    <p class="switch-form-text">
      <span>Already have an account?</span>
      <a href="/login">Log In</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/registration.js"></script>
{% endblock %}
