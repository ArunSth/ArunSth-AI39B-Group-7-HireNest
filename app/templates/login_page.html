<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — HireNest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/statics/css/login.css" />
  <style>
    .login-page-wrap {
      min-height: calc(100vh - 90px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px; background: var(--body-bg);
    }
    .login-card {
      background: var(--modal-bg); border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      width: 100%; max-width: 460px; padding: 48px 40px 40px;
    }
    .login-card .brand-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px; justify-content: center;
    }
    .login-card .brand-row img { width: 36px; height: 36px; border-radius: 8px; }
    .login-card .brand-row span { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .login-card h2 { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; text-align: center; }
    .login-card .subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; }
    .login-card .form-group { margin-bottom: 18px; }
    .login-card .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .login-card .form-group input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--input-border);
      border-radius: 8px; font-size: 14px; background: var(--input-bg);
      color: var(--text-primary); outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    .login-card .form-group input:focus { border-color: #6d5dfc; }
    .login-card .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6d5dfc, #8b5cf6);
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    }
    .login-card .btn-submit:hover { opacity: 0.9; }
    .login-card .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-card .utilities { display: flex; justify-content: space-between; margin-top: 14px; font-size: 13px; }
    .login-card .utilities a { color: #6d5dfc; text-decoration: none; }
    .login-card .switch-text { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    .login-card .switch-text a { color: #6d5dfc; text-decoration: none; font-weight: 600; }
    .alert-box { padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; }
    .alert-box.error   { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
    .alert-box.success { background:#f0fdf4; color:#16a34a; border:1px solid #86efac; }
    .role-selection { margin-bottom: 24px; }
    .role-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .role-options { display: flex; gap: 12px; }
    .role-option {
      flex: 1; padding: 12px; border: 1.5px solid var(--input-border);
      border-radius: 8px; cursor: pointer; text-align: center;
      transition: all 0.2s; background: var(--input-bg); color: var(--text-primary);
      font-size: 14px; font-weight: 500;
    }
    .role-option:hover { border-color: #6d5dfc; background: rgba(109, 93, 252, 0.05); }
    .role-option.active { border-color: #6d5dfc; background: rgba(109, 93, 252, 0.1); color: #6d5dfc; font-weight: 600; }
    .role-option input[type="radio"] { display: none; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-section">
      <a href="/" class="logo-link">
        <img
          src="{{ url_for('download_file', filename='logos/logo_6.png') }}"
          alt="HireNest Logo"
          class="logo"
        />
        <h2>HireNest</h2>
      </a>
    </div>
    <nav class="nav-links">
    </nav>
    <div class="nav-icons"></div>
    <div class="auth-buttons">
      <i class="fa-solid fa-sun" id="theme-toggle"></i>
      <a href="/register" class="signup-btn" style="text-decoration:none;">Sign Up</a>
    </div>
  </header>

  <div class="login-page-wrap">
    <div class="login-card">
      <div class="brand-row">
        <img src="{{ url_for('download_file', filename='logos/logo_6.png') }}" alt="HireNest">
        <span>HireNest</span>
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to your HireNest account</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-box {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <div id="login-alert" style="display:none;" class="alert-box error"></div>

      <form id="login-form-page" method="POST" action="/login">
        <div class="role-selection">
          <label class="role-label">I am a:</label>
          <div class="role-options">
            <label class="role-option active" data-role="job_seeker">
              <input type="radio" name="role" value="job_seeker" checked />
              <i class="fa-solid fa-briefcase" style="margin-right: 6px;"></i>Job Seeker
            </label>
            <label class="role-option" data-role="employer">
              <input type="radio" name="role" value="employer" />
              <i class="fa-solid fa-building" style="margin-right: 6px;"></i>Employer
            </label>
            <label class="role-option" data-role="admin">
              <input type="radio" name="role" value="admin" />
              <i class="fa-solid fa-user-shield" style="margin-right: 6px;"></i>Admin
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="lp-email">Email Address</label>
          <input type="email" id="lp-email" name="email" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="lp-password">Password</label>
          <input type="password" id="lp-password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" id="lp-submit-btn">Log In</button>
      </form>

      <div class="utilities">
        <a href="/forget-password">Forgot Password?</a>
      </div>

      <p class="switch-text">
        Don't have an account? <a href="/register">Sign Up</a>
      </p>
    </div>
  </div>

  <script src="/statics/js/login.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form-page');
      const alertBox = document.getElementById('login-alert');
      const submitBtn = document.getElementById('lp-submit-btn');
      const roleOptions = document.querySelectorAll('.role-option');
      // Handle role selection UI
      roleOptions.forEach(option => {
          option.addEventListener('click', () => {
              roleOptions.forEach(o => o.classList.remove('active'));
              option.classList.add('active');
              option.querySelector('input[type="radio"]').checked = true;
          });
      });
      if (!form) return;
      form.addEventListener('submit', async (e) => {
          e.preventDefault();
          alertBox.style.display = 'none';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Logging in...';
          const formData = new FormData(form);
          try {
              const res = await fetch('/login', {
                  method: 'POST',
                  headers: { 'X-Requested-With': 'XMLHttpRequest' },
                  body: formData,
              });
              const data = await res.json();
              if (data.status === 'ok') {
                  window.location.href = data.redirect;
              } else {
                  alertBox.textContent = data.message || 'Login failed.';
                  alertBox.style.display = 'block';
                  alertBox.className = 'alert-box error';
                  submitBtn.disabled = false;
                  submitBtn.textContent = 'Log In';
              }
          } catch {
              alertBox.textContent = 'Network error. Please try again.';
              alertBox.style.display = 'block';
              submitBtn.disabled = false;
              submitBtn.textContent = 'Log In';
          }
      });
  });
  </script>
</body>
</html>
