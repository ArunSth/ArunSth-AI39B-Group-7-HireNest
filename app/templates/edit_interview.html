{% extends 'employer_base.html' %}

{% block page_title %}Edit Interview{% endblock %}
{% block page_subtitle %}Update interview details and status.{% endblock %}

{% block content %}
      <div class="section" style="max-width: 900px;">
        <div class="table-container">
          <form method="POST" action="{{ url_for('interview.edit_interview', interview_id=interview.Interview_id) }}" data-validate>
            <div style="padding: 30px;">
              <div class="form-row">
                <div class="form-group">
                  <label for="interview_date">Interview Date *</label>
                  <input type="date" id="interview_date" name="interview_date" value="{{ interview.date_input_value }}" required>
                </div>
                <div class="form-group">
                  <label for="interview_time">Interview Time *</label>
                  <input type="time" id="interview_time" name="interview_time" value="{{ interview.time_input_value }}" required>
                </div>
              </div>

              <div class="form-group">
                <label for="mode">Interview Mode *</label>
                <select id="mode" name="mode" required>
                  <option value="Google Meet" {% if interview.Mode == 'Google Meet' %}selected{% endif %}>Google Meet (Online)</option>
                  <option value="Zoom" {% if interview.Mode == 'Zoom' %}selected{% endif %}>Zoom (Online)</option>
                  <option value="Phone" {% if interview.Mode == 'Phone' %}selected{% endif %}>Phone Call</option>
                  <option value="In-person" {% if interview.Mode == 'In-person' %}selected{% endif %}>In-person</option>
                </select>
              </div>

              <div class="form-group">
                <label for="meeting_link">Google Meet Link or Meeting Details *</label>
                <textarea id="meeting_link" name="meeting_link" required style="min-height: 80px;">{{ interview.Meeting_link }}</textarea>
              </div>

              <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                  <option value="scheduled" {% if interview.Status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                  <option value="completed" {% if interview.Status == 'completed' %}selected{% endif %}>Completed</option>
                  <option value="cancelled" {% if interview.Status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                  <option value="no-show" {% if interview.Status == 'no-show' %}selected{% endif %}>No Show</option>
                  <option value="rescheduled" {% if interview.Status == 'rescheduled' %}selected{% endif %}>Rescheduled</option>
                </select>
              </div>

              <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn-primary">
                  <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="/employer/interviews" class="btn-secondary">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/static/css/employer_dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
// Set minimum date to today
document.getElementById('interview_date').setAttribute('min', new Date().toISOString().split('T')[0]);
</script>
{% endblock %}
