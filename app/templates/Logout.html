{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
  <div class="auth-box" style="text-align: center;">
    <h2>Logged Out</h2>
    <p style="color: var(--text-secondary); margin: 20px 0; font-size: 16px;">
      You have been successfully and securely logged out of your HireNest profile workspace.

    <a href="/login" class="btn-submit" style="display: block; text-decoration: none;">Log Back In</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/logout.js"></script>
{% endblock %}
